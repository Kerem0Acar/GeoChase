<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-title>GeoChase</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div style="text-align: center; margin-top: 50px; margin-bottom: 30px;">
    <h2>Hoş Geldin, Kaşif!</h2>
    <p>Maceraya başlamak için giriş yap.</p>
  </div>

  <ion-item>
    <ion-label position="floating">Kullanıcı Adı</ion-label>
    <ion-input type="text" [(ngModel)]="username" placeholder=""></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Şifre</ion-label>
    <ion-input type="password" [(ngModel)]="password" placeholder="Şifren"></ion-input>
  </ion-item>

  <ion-button expand="block" color="primary" class="ion-margin-top" (click)="onLogin()">
    Maceraya Başla (Giriş)
  </ion-button>

  <div style="text-align: center; margin-top: 30px; position: relative; z-index: 10;">
    <p style="color: #888; font-size: 0.9rem; margin-bottom: 10px;">Sisteme Kayıtlı Değil Misin?</p>
    <ion-button expand="block" fill="outline" color="success" (click)="goToRegister()" 
                style="font-weight: bold; letter-spacing: 1px; --border-width: 2px; --border-radius: 8px; box-shadow: 0 0 15px rgba(45, 211, 111, 0.2);">
      YENİ AJAN DOSYASI OLUŞTUR
    </ion-button>
  </div>

</ion-content>
